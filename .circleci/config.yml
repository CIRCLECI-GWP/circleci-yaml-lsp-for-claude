version: 2.1

# CI for the circleci-yaml-lsp-for-claude plugin. No build step — this is a
# Bash + Node project with no compiled output — just lint and test.

parameters:
  run-maintenance:
    type: boolean
    default: false

jobs:
  lint:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - run:
          name: Install shellcheck
          command: |
            sudo apt-get update -y
            sudo apt-get install -y shellcheck
      - run:
          name: Lint shell scripts (shellcheck)
          command: shellcheck plugins/circleci-yaml-lsp/bin/circleci-yaml-lsp scripts/update-pins.sh scripts/open-upstream-update-pr.sh
      - run:
          name: Check JS syntax (node --check)
          command: |
            for f in $(git ls-files '*.mjs'); do
              node --check "$f" || exit 1
              echo "ok: $f"
            done
      - run:
          name: Validate JSON manifests
          command: |
            for f in $(git ls-files '*.json'); do
              node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" || exit 1
              echo "ok: $f"
            done
      - run:
          name: Hover docs are generated, not hand-edited
          command: npm run check:hover-docs

  test:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - run:
          name: Run test suite
          command: npm run test:ci
      - store_test_results:
          path: test-results
          when: always

  upstream-update:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - run:
          name: Install gh CLI
          command: |
            sudo apt-get update -y && sudo apt-get install -y gh
      - run:
          name: Configure git identity
          command: |
            git config user.email "ci@circleci-yaml-lsp.local"
            git config user.name "circleci-yaml-lsp bot"
      - run:
          name: Authenticate git pushes with the gh-bot token
          # checkout's `origin` remote is SSH, authenticated with CircleCI's
          # own read-only deploy key — `gh auth setup-git` only wires up an
          # HTTPS credential helper, which an SSH remote never consults. Point
          # origin at HTTPS with the write-scoped gh-bot token embedded so
          # `git push` actually uses it.
          command: |
            token="${GH_TOKEN:-$GITHUB_TOKEN}"
            slug="$(gh repo view --json nameWithOwner -q .nameWithOwner)"
            git remote set-url origin "https://x-access-token:${token}@github.com/${slug}.git"
      - run:
          name: Open upstream-bump PR if a newer release exists
          command: bash scripts/open-upstream-update-pr.sh

workflows:
  ci:
    jobs:
      - lint
      - test

  maintenance:
    when: << pipeline.parameters.run-maintenance >>
    jobs:
      - upstream-update:
          context:
            - gh-bot
